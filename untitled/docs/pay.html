<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>支付中...</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  background:#f5f5f5;min-height:100vh;display:flex;align-items:center;justify-content:center;
}
.card{
  width:92%;max-width:380px;background:#fff;border-radius:18px;padding:32px 24px;
  text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.1);
}
.spin{
  width:48px;height:48px;border:4px solid #e8e8e8;border-top-color:#07c160;
  border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.amount{font-size:2.4rem;font-weight:900;color:#e74c3c;margin:16px 0 4px}
.label{color:#999;font-size:.88rem;margin-bottom:24px}
.bar{height:4px;background:#e8e8e8;border-radius:2px;overflow:hidden;margin-bottom:8px}
.bar div{height:100%;width:60%;background:linear-gradient(90deg,#07c160,#1aad19);border-radius:2px;animation:prog 2s ease-out}
@keyframes prog{from{width:0}}
.hint{color:#bbb;font-size:.78rem}
.done{display:none;animation:fadeIn .4s}
@keyframes fadeIn{from{opacity:0;transform:scale(.9)}}
.done .icon{font-size:3.5rem;margin-bottom:12px}
.done .msg{font-size:1.1rem;color:#333;font-weight:600;margin-bottom:4px}
.done .sub{color:#999;font-size:.88rem;margin-bottom:18px}
.btn{
  display:inline-block;padding:10px 32px;border-radius:24px;
  background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;
  font-size:.95rem;font-weight:600;letter-spacing:.5px;
  text-decoration:none;transition:all .2s;
}
.btn:active{transform:scale(.96);opacity:.8}
</style>
</head>
<body>
<div class="card" id="card">
  <div id="loading">
    <div class="spin"></div>
    <div style="color:#333;font-weight:600">正在从您的账户扣款...</div>
    <div class="amount">-¥5.00</div>
    <div class="label">微信支付 · 自动续费</div>
    <div class="bar"><div></div></div>
    <div class="hint">请勿关闭页面</div>
  </div>
  <div class="done" id="done">
    <div class="icon">✅</div>
    <div class="msg">扣款成功</div>
    <div class="sub">已从您的账户扣除 ¥5.00<br>感谢您的赞助 ❤️</div>
    <a href="javascript:location.reload()" class="btn">知道了</a>
  </div>
</div>
<script>
setTimeout(()=>{
  document.getElementById('loading').style.display='none';
  document.getElementById('done').style.display='block';
},3000);
</script>
</body>
</html>
